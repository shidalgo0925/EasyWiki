{% extends "base.html" %}
{% block title %}Registro{% endblock %}
{% block content %}
<div class="container-fluid d-flex justify-content-center align-items-center" style="min-height:80vh;">
  <div class="card card-soft p-4" style="min-width:360px;max-width:420px;">
    <h4 class="mb-3 text-center">Crear Cuenta - EasyCoach</h4>
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" name="nombre" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Confirmar Contraseña</label>
        <input type="password" name="confirm" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Registrarse</button>
    </form>
    <div class="mt-3 text-center">
      <a href="{{ url_for('auth.login') }}">¿Ya tienes cuenta? Inicia sesión</a>
    </div>
  </div>
</div>
{% endblock %}
